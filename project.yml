name: affilarm
options:
  bundleIdPrefix: com.osprey74
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  affilarm:
    type: application
    platform: iOS
    sources:
      - affilarm
    settings:
      base:
        INFOPLIST_FILE: affilarm/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.osprey74.affilarm
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: affilarm/Resources/Info.plist
      properties:
        CFBundleDisplayName: affilarm
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  affilarmTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - affilarmTests
    dependencies:
      - target: affilarm
